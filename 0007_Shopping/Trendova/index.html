<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" type="image/x-icon" href="assets/images/logo/favicon.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trendova - eCommerce website</title>
    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>
    <div class="overlay" data-overlay></div>

    <!-- Modal -->
    <div class="modal closed" data-modal>
        <div class="modal-close-overlay" data-modal-overlay></div>

        <div class="modal-content">
            <button class="modal-close-btn" data-modal-close>
                <ion-icon name="close-outline"></ion-icon>
            </button>

            <div class="newsletter-img">
                <img src="assets/images/newsletter.png" alt="subscribe newsletter" width="400" height="400">
            </div>

            <div class="newsletter">
                <form action="#">
                    <div class="newsletter-header">
                        <h3 class="newsletter-title">Subscribe Newsletter.</h3>
                        <p class="newsletter-desc">
                            Subscribe to the <b>Trendova</b> mailing list to receive updates on new arrivals, special
                            offers and other discount information.
                        </p>
                    </div>

                    <input type="email" name="email" class="email-field" placeholder="Enter your email" required>
                    <button type="submit" class="btn-newsletter">Subscribe</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Notification toast -->
    <div class="notification-toast" data-toast>
        <button class="toast-close-btn" data-toast-close>
            <ion-icon name="close-outline"></ion-icon>
        </button>
        <div class="toast-banner">
            <img src="./assets/images/products/jewellery-1.jpg" alt="Rose Gold Earrings" width="80" height="70">
        </div>
        <div class="toast-details">
            <p class="toast-message">
                Someone in new just bought
            </p>
            <p class="toast-title">Rose Gold Earrings</p>
            <p class="toast-meta">
                <time datetime="PT2M">2 minutes</time> ago    
            </p>
        </div>
    </div>

    <header>
        <div class="header-top">
            <div class="container">
                <ul class="header-social-container">
                    <li>
                        <a href="#" class="social-li">
                            <ion-icon name="logo-facebook"></ion-icon>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="social-li">
                            <ion-icon name="logo-twitter"></ion-icon>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="social-li">
                            <ion-icon name="logo-instagram"></ion-icon>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="social-li">
                            <ion-icon name="logo-linkedin"></ion-icon>
                        </a>
                    </li>
                </ul>

                <div class="header-alert-news">
                    <p><b>Free Shipping</b> This Week Order Over-$55</p>
                </div>

                <div class="header-top-action">
                    <select name="currency">
                        <option value="usd">USD &dollar;</option>
                        <option value="ueur">EUR &euro;;</option>
                    </select>

                    <select name="language">
                        <option value="en-US">English</option>
                        <option value="es-ES">Espa&ntilde;</option>
                        <option value="fr">Fran&ccedil;</option>
                    </select>
                </div>

                <div class="header-main">
                    <div class="cotainer">
                        <a href="#" class="header-logo">
                            <img src=""">
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <script src="assets/js/script.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>

</html>
