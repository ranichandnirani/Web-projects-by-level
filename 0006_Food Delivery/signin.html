<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – Aroma Avenue</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Condensed:wght@100..900&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --yellow: #F5A623;
      --yellow-dark: #d4891a;
      --yellow-light: #FFF8EC;
      --black: #1a1a1a;
      --gray: #6b6b6b;
      --light: #f9f5ee;
      --white: #ffffff;
      --radius: 20px;
    }

    body {
      font-family: "Roboto Condensed", sans-serif;
      background-color: var(--light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background blobs */
    body::before {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      background: var(--yellow);
      border-radius: 50%;
      top: -150px;
      right: -150px;
      opacity: 0.15;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      width: 350px;
      height: 350px;
      background: var(--yellow);
      border-radius: 50%;
      bottom: -100px;
      left: -100px;
      opacity: 0.10;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      width: 900px;
      max-width: 95vw;
      min-height: 560px;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.12);
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* LEFT PANEL */
    .left-panel {
      flex: 1;
      background: var(--yellow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 36px;
      position: relative;
      overflow: hidden;
    }

    .left-panel::before {
      content: '';
      position: absolute;
      width: 320px;
      height: 320px;
      border: 60px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      bottom: -100px;
      right: -100px;
    }

    .left-panel::after {
      content: '';
      position: absolute;
      width: 180px;
      height: 180px;
      border: 40px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      top: -50px;
      left: -50px;
    }

    .brand {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .brand-tagline {
      margin-top: 32px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 1rem;
      line-height: 1.6;
      text-align: center;
      max-width: 220px;
    }

    .food-icon {
      margin-top: 36px;
      font-size: 5rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    /* RIGHT PANEL */
    .right-panel {
      flex: 1.1;
      background: var(--white);
      padding: 52px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .right-panel h2 {
      align-items: center;
      text-align: center;
      font-size: 2rem;
      color: var(--black);
      margin-bottom: 6px;
    }

    .right-panel p.sub {
      color: var(--gray);
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--black);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #e8e0d0;
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--black);
      background: var(--yellow-light);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--yellow);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.15);
      background: var(--white);
    }

    input::placeholder {
      color: #bbb;
    }

    .forgot {
      text-align: right;
      margin-top: -12px;
      margin-bottom: 24px;
    }

    .forgot a {
      font-size: 0.82rem;
      color: var(--yellow-dark);
      text-decoration: none;
      font-weight: 500;
    }

    .forgot a:hover {
      text-decoration: underline;
    }

    .btn-signin {
      width: 100%;
      padding: 14px;
      background: var(--yellow);
      color: var(--white);
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(245, 166, 35, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 5px;
      text-decoration: none;
    }

    .btn-signin:hover {
      background: var(--yellow-dark);
      transform: translateY(-1px);
      box-shadow: 0 10px 28px rgba(245, 166, 35, 0.4);
    }

    .btn-signin:active {
      transform: translateY(0);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: #ccc;
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ece6da;
    }

    .btn-google {
      width: 100%;
      padding: 13px;
      background: var(--white);
      border: 1.5px solid #e8e0d0;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--black);
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-google:hover {
      border-color: var(--yellow);
      background: var(--yellow-light);
    }

    .google-icon {
      width: 20px;
      height: 20px;
    }

    .signup-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.88rem;
      color: var(--gray);
    }

    .signup-link a {
      color: var(--yellow-dark);
      font-weight: 600;
      text-decoration: none;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 680px) {
      .left-panel {
        display: none;
      }

      .right-panel {
        padding: 40px 28px;
      }

      .container {
        border-radius: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LEFT -->
    <div class="left-panel">
      <div class="brand">
        <a href="index.html">
          <img src="Images/rest-logo.png" alt="Aroma Avenue" style="width: 180px; border-radius: 50%; background: whitesmoke;" />
        </a>
        <p class="brand-tagline">Delicious food delivered fast to your doorstep 🚀</p>
        <div class="food-icon">🍕</div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right-panel">
      <h2>Welcome back!</h2>

      <!-- <a href="index.html" style="display: inline-flex; align-items: center; gap: 6px; color: #6b6b6b; text-decoration: none; font-size: 0.88rem; font-weight: 500; margin-bottom: 24px;"> ← Back to Home </a> -->
      <p class="sub">Sign in to your Aroma Avenue account</p>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <div class="forgot">
        <a href="#">Forgot password?</a>
      </div>

      <button class="btn-signin">
        Sign In →
      </button>

      <div class="divider">or continue with</div>

      <button class="btn-google">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
          <path fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
          <path fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        Continue with Google
      </button>

      <p class="signup-link">
        Don't have an account? <a href="#">Sign up free</a>
      </p>

      <a href="index.html" class="btn-signin"> ← Back to Home </a>
    </div>

  </div>

</body>

</html>
